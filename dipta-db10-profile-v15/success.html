<style>
:root{--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;padding:24px;font-family:var(--font);color:#f5f5f7;

.ok svg{width:30px;height:30px}
h1{font-size:26px;font-weight:600;letter-spacing:-.02em;margin-bottom:12px}
p{color:rgba(245,245,247,.62);line-height:1.6;margin-bottom:24px}
